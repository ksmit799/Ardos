name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake tar git zip unzip curl pkg-config

      - name: Build
        if: github.event_name == 'pull_request'
        run: |
          cmake -B cmake-build-release \
            -DCMAKE_TOOLCHAIN_FILE=libs/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build cmake-build-release

      - uses: cpp-linter/cpp-linter-action@v2
        if: github.event_name == 'pull_request'
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: 'file'  # Use .clang-format config file
          tidy-checks: '' # Use .clang-tidy config file
          ignore: 'libs'
          # only 'update' a single comment in a pull request thread.
          thread-comments: ${{ github.event_name == 'pull_request' && 'update' }}

      - name: Fail fast
        if: github.event_name == 'pull_request' && steps.linter.outputs.checks-failed > 0
        run: exit 1

      - name: Build Docker image
        run: docker build .

  tests:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake tar git zip unzip curl pkg-config

      - name: Build with coverage
        run: |
          cmake -B cmake-build-debug \
            -DCMAKE_TOOLCHAIN_FILE=libs/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DARDOS_COVERAGE=ON
          cmake --build cmake-build-debug

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install test deps
        run: pip install -r tests/requirements-test.txt

      - name: Run tests
        env:
          ARDOS_BINARY: ${{ github.workspace }}/cmake-build-debug/bin/ardos
        run: |
          pytest tests/ -v --junitxml=junit.xml \
            --ignore=tests/benchmarks \
            --timeout=60

      - name: Generate coverage report
        if: always()
        run: |
          mkdir -p coverage
          gcovr -r . --exclude libs --exclude tests \
            --html-details coverage/index.html \
            --xml coverage.xml \
            --print-summary

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
            coverage.xml
            tests/logs/message-coverage.txt

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-logs
          path: tests/logs/

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml
