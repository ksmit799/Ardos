name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake tar git zip unzip curl pkg-config

      - name: Build Ardos
        run: |
          cmake -B cmake-build-release \
            -DCMAKE_TOOLCHAIN_FILE=libs/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build-release

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        env:
          ARDOS_BINARY: ${{ github.workspace }}/cmake-build-release/bin/ardos
        with:
          mode: walltime
          # The 10k-population CA benchmarks open ~10k client sockets in the
          # test process plus ~10k accept sockets in the CA child process, so
          # the default 1024 fd cap is far too low. Bumping somaxconn keeps
          # the kernel from dropping incoming connects during the burst.
          run: |
            ulimit -n 65535
            sudo sysctl -w net.core.somaxconn=4096
            pytest tests/benchmarks/ --codspeed -v --timeout=600
